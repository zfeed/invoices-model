services:
    postgres:
        env_file: .env
        image: postgres:18.2
        ports:
            - '${POSTGRES_PORT}:5432'
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        command: postgres -c log_statement=all -c log_connections=on -c log_disconnections=on
        volumes:
            - pgdata:/var/lib/postgresql

    kafka:
        image: apache/kafka:4.0.2
        ports:
            - '9092:9092'
        environment:
            KAFKA_NODE_ID: 1
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
            KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:19092,CONTROLLER://0.0.0.0:9093,HOST://0.0.0.0:9092
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,HOST://localhost:9092
            KAFKA_PROCESS_ROLES: broker,controller
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
            CLUSTER_ID: kafka-invoices-model-01
        volumes:
            - kafkadata:/var/lib/kafka/data

    kafka-ui:
        image: provectuslabs/kafka-ui:latest
        ports:
            - '8080:8080'
        environment:
            DYNAMIC_CONFIG_ENABLED: 'true'
            KAFKA_CLUSTERS_0_NAME: local
            KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:19092
        depends_on:
            - kafka

    temporal:
        image: temporalio/auto-setup:1.25
        ports:
            - '7233:7233'
        environment:
            DB: postgres12
            DB_PORT: 5432
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PWD: ${POSTGRES_PASSWORD}
            POSTGRES_SEEDS: postgres
        depends_on:
            - postgres

    temporal-ui:
        image: temporalio/ui:2.31.2
        ports:
            - '8233:8080'
        environment:
            TEMPORAL_ADDRESS: temporal:7233
            TEMPORAL_CORS_ORIGINS: http://localhost:3000
        depends_on:
            - temporal

    loki:
        image: grafana/loki:3.7.1
        ports:
            - '3100:3100'
        command: -config.file=/etc/loki/local-config.yaml
        volumes:
            - lokidata:/var/lib/loki

    grafana:
        image: grafana/grafana:12.4.2
        ports:
            - '3001:3000'
        environment:
            GF_SECURITY_ADMIN_USER: admin
            GF_SECURITY_ADMIN_PASSWORD: admin
            GF_AUTH_ANONYMOUS_ENABLED: 'true'
            GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
            GF_INSTALL_PLUGINS: grafana-lokiexplore-app
        volumes:
            - ./grafana/provisioning:/etc/grafana/provisioning
            - grafanadata:/var/lib/grafana
        depends_on:
            - loki

volumes:
    pgdata:
    kafkadata:
    lokidata:
    grafanadata:

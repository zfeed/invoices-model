services:
    postgres:
        env_file: .env.docker
        image: postgres:18.2
        ports:
            - '${POSTGRES_PORT}:5432'
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        command: postgres -c log_statement=all -c log_connections=on -c log_disconnections=on
        volumes:
            - pgdata:/var/lib/postgresql

volumes:
    pgdata:
